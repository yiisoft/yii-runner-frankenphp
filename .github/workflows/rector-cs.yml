name: Rector + PHP CS Fixer

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/rector-cs.yml'
      - 'composer.json'
      - 'rector.php'
      - '.php-cs-fixer.dist.php'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rector:
    permissions:
      contents: write # Required to let the reusable workflow commit Rector/PHP CS Fixer changes to the PR branch.
    uses: yiisoft/actions/.github/workflows/rector-cs.yml@master
    with:
      php: 8.1
